version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./AmaRAGBackend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:5001;http://+:5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
    volumes:
      - ./AmaRAGBackend:/app
      - uploads:/app/uploads
    networks:
      - ama-network

  # Frontend (optional for Docker)
  frontend:
    build:
      context: ./AmaRAGUI
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    environment:
      - API_URL=http://localhost:5000/api/v1
    volumes:
      - ./AmaRAGUI:/app
      - /app/node_modules
    networks:
      - ama-network
    depends_on:
      - backend

volumes:
  uploads:

networks:
  ama-network:
    driver: bridge
